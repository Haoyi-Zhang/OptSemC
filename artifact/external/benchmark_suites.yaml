  - suite_id: ClickHouse-JoinAlgorithms
    name: ClickHouse join-algorithm control motifs
    motifs:
      - motif_id: CH-hash
        requirements: {control_surface: clickhouse_join_algorithm_hash}
      - motif_id: CH-parallel-hash
        requirements: {control_surface: clickhouse_join_algorithm_parallel_hash}
      - motif_id: CH-grace-hash
        requirements: {control_surface: clickhouse_join_algorithm_grace_hash}
      - motif_id: CH-full-sort-merge
        requirements: {control_surface: clickhouse_join_algorithm_full_sorting_merge}
      - motif_id: CH-partial-merge
        requirements: {control_surface: clickhouse_join_algorithm_partial_merge}
      - motif_id: CH-direct
