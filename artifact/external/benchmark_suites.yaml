      - motif_id: CTRL-disable-materialization
        requirements: {control_surface: disable_materialization}
      - motif_id: CTRL-broadcast-hint
        requirements: {control_surface: broadcast_hint}
      - motif_id: CTRL-merge-hint
        requirements: {control_surface: merge_hint}
      - motif_id: CTRL-explain-logical
        requirements: {control_surface: explain_logical}
      - motif_id: CTRL-explain-analyze
        requirements: {control_surface: explain_analyze}
  - suite_id: PostgreSQL-Controls
    name: PostgreSQL optimizer GUC and planning-control motifs
    motifs:
      - motif_id: PG-hashjoin-off
        requirements: {control_surface: pg_enable_hashjoin_off}
      - motif_id: PG-mergejoin-off
        requirements: {control_surface: pg_enable_mergejoin_off}
      - motif_id: PG-nestloop-off
        requirements: {control_surface: pg_enable_nestloop_off}
      - motif_id: PG-hashagg-off
        requirements: {control_surface: pg_enable_hashagg_off}
      - motif_id: PG-indexscan-off
        requirements: {control_surface: pg_enable_indexscan_off}
      - motif_id: PG-indexonlyscan-off
        requirements: {control_surface: pg_enable_indexonlyscan_off}
      - motif_id: PG-incremental-sort-off
        requirements: {control_surface: pg_enable_incremental_sort_off}
      - motif_id: PG-memoize-off
