      - motif_id: CH-auto
        requirements: {control_surface: clickhouse_join_algorithm_auto}
  - suite_id: Spark-Trino-Distribution
    name: Spark/Trino distribution, hint, and adaptive motifs
    motifs:
      - motif_id: DIST-spark-merge-hint
        requirements: {control_surface: spark_merge_hint}
      - motif_id: DIST-spark-shuffle-hash-hint
        requirements: {control_surface: spark_shuffle_hash_hint}
      - motif_id: DIST-spark-replicate-nl-hint
        requirements: {control_surface: spark_shuffle_replicate_nl_hint}
      - motif_id: DIST-spark-aqe-disabled
