  - suite_id: DuckDB-Controls
    name: DuckDB optimizer-control and pushdown-disable motifs
    motifs:
      - motif_id: DUCK-disable-optimizer
        requirements: {control_surface: duck_disable_optimizer}
      - motif_id: DUCK-disable-filter-pushdown
        requirements: {control_surface: duck_disable_filter_pushdown}
      - motif_id: DUCK-disable-stats-prop
        requirements: {control_surface: duck_disable_statistics_propagation}
      - motif_id: DUCK-cte-materialized
        requirements: {control_surface: materialized_hint}
      - motif_id: DUCK-cte-not-materialized
